name: checks

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - '**'

permissions:
  contents: read

env:
  REPOSITORY_PASSWORD: password
  JWT_SECRET: 

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up environment
        uses: ./.github/actions/setup

      - name: Run linter
        run: npm run lint

  bdd-smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_DATABASE: operationaldb
          MYSQL_USER: node
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up environment
        uses: ./.github/actions/setup

      - name: Start Blazegraph
        run: /usr/bin/java -Djava.awt.headless=true -jar blazegraph.jar &

      - name: Wait for Blazegraph
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9999/blazegraph/status > /dev/null; then
              echo "Blazegraph is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Blazegraph did not start in time"
          exit 1

      - name: Run BDD smoke tests
        run: |
          npx cucumber-js \
            --config cucumber.js \
            --tags "@smoke" \
            --format progress \
            test/bdd/ \
            --import test/bdd/steps/ \
            --exit

      - name: Upload log files
        if: '!cancelled()'
        uses: actions/upload-artifact@v4
        with:
          name: bdd-smoke-logs
          path: ./test/bdd/log/

  bdd-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_DATABASE: operationaldb
          MYSQL_USER: node
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up environment
        uses: ./.github/actions/setup

      - name: Start Blazegraph
        run: /usr/bin/java -Djava.awt.headless=true -jar blazegraph.jar &

      - name: Wait for Blazegraph
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9999/blazegraph/status > /dev/null; then
              echo "Blazegraph is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Blazegraph did not start in time"
          exit 1

      - name: Run full BDD tests
        run: |
          npx cucumber-js \
            --config cucumber.js \
            --tags "not @ignore" \
            --format progress \
            test/bdd/ \
            --import test/bdd/steps/ \
            --exit

      - name: Upload log files
        if: '!cancelled()'
        uses: actions/upload-artifact@v4
        with:
          name: bdd-tests-logs
          path: ./test/bdd/log/
